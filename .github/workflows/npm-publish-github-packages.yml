name: Cypress Tests

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # 🔥 Fix Artifactory issue
      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org/

      # 🔥 Cache npm (speed)
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      # 🔥 IMPORTANT FIX → use install instead of ci
      - name: Install dependencies
        run: npm install

      # Run Cypress
      - name: Run Cypress tests
        run: npx cypress run

      # Generate report
      - name: Generate report
        run: npm run cypress:report

      # Upload report
      - name: Upload Cypress Report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: cypress/reports/html

      # Upload screenshots
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: cypress/screenshots

      # Upload videos
      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: cypress/videos
