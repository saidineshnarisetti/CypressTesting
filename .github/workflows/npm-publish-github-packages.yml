name: Cypress Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Use public npm registry (fix Artifactory issue)
      - name: Use public npm registry
        run: npm config set registry https://registry.npmjs.org/

      # 3. Cache npm dependencies
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      # 4. Cache Cypress binary
      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ hashFiles('package-lock.json') }}

      # 5. Install dependencies (FAST & RELIABLE)
      - name: Install dependencies
        run: npm ci

      # 6. Run Cypress tests
      - name: Run Cypress tests
        run: npx cypress run

      # 7. Generate Mochawesome report
      - name: Generate report
        run: npm run cypress:report

      # 8. Upload HTML report
      - name: Upload Cypress Report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: cypress/reports/html

      # 9. Upload screenshots (only if failed)
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: cypress/screenshots

      # 10. Upload videos (always)
      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: cypress/videos
